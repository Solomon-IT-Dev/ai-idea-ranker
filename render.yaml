services:
  - type: web
    name: ai-idea-ranker-server
    runtime: node
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm -C apps/server build
    startCommand: node apps/server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
